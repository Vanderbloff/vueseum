name: Deploy Frontend to Azure VM

on:
  push:
    branches: [ "master" ]
    paths:
      - 'vueseum-frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:     

concurrency:
  group: "frontend-deploy"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./vueseum-frontend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './vueseum-frontend/package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build

      # Enhanced archive creation with verification
      - name: Create and Verify Build Archive
        run: |
          cd build
          echo "Build directory contents before archive:"
          ls -la
          tar -czf ../build.tar.gz .
          cd ..
          echo "Archive created with size:"
          ls -lh build.tar.gz
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
      
      - name: Transfer and Deploy
        uses: azure/CLI@v1
        with:
          inlineScript: |
            # Create storage account if it doesn't exist
            az storage account create \
              --name vueseumdeploy \
              --resource-group vueseum-prod-rg \
              --sku Standard_LRS \
              --kind StorageV2 \
              2>/dev/null || true

            # Create temporary container with timestamp
            CONTAINER_NAME="deploy-$(date +%s)"
            az storage container create \
              --account-name vueseumdeploy \
              --name $CONTAINER_NAME \
              --auth-mode login

            # Upload and verify the archive
            az storage blob upload \
              --account-name vueseumdeploy \
              --container-name $CONTAINER_NAME \
              --name build.tar.gz \
              --file "${{ github.workspace }}/vueseum-frontend/build.tar.gz" \
              --auth-mode login

            # Generate SAS token
            END_TIME=$(date -u -d "30 minutes" '+%Y-%m-%dT%H:%MZ')
            SAS_TOKEN=$(az storage blob generate-sas \
              --account-name vueseumdeploy \
              --container-name $CONTAINER_NAME \
              --name build.tar.gz \
              --permissions r \
              --expiry $END_TIME \
              --auth-mode login \
              --as-user \
              --output tsv)

            # Get blob URL
            BLOB_URL=$(az storage blob url \
              --account-name vueseumdeploy \
              --container-name $CONTAINER_NAME \
              --name build.tar.gz \
              --output tsv)

            # Deploy on VM with enhanced logging and verification
            az vm run-command invoke \
              --resource-group vueseum-prod-rg \
              --name vueseum-app-prod \
              --command-id RunShellScript \
              --scripts "
                # Ensure clean deployment directory
                rm -rf /tmp/deploy
                mkdir -p /tmp/deploy
                cd /tmp/deploy
                
                echo 'Downloading build archive...'
                curl -o build.tar.gz '${BLOB_URL}?${SAS_TOKEN}'
                
                # Verify download
                if [ ! -f build.tar.gz ]; then
                  echo 'Failed to download archive'
                  exit 1
                fi
                
                echo 'Archive size and contents:'
                ls -lh build.tar.gz
                
                # Extract and verify
                echo 'Extracting archive...'
                mkdir -p /tmp/deploy/extracted
                tar -xzf build.tar.gz -C /tmp/deploy/extracted
                
                echo 'Extracted contents:'
                ls -la /tmp/deploy/extracted
                
                if [ ! -f /tmp/deploy/extracted/index.js ]; then
                  echo 'Warning: index.js not found in extracted files'
                fi
                
                # Deploy using the correct path
                echo 'Running deployment script...'
                cd /opt/vueseum && ./deploy-frontend.sh /tmp/deploy/extracted
                
                # Verify deployment
                echo 'Deployment completed. Verifying service...'
                systemctl status vueseum-frontend.service --no-pager
                
                # Check the current symlink
                echo 'Checking current symlink:'
                ls -la /opt/vueseum/frontend/current
                
                # Clean up
                echo 'Cleaning up...'
                rm -rf /tmp/deploy
                
                # Final service check
                if ! systemctl is-active --quiet vueseum-frontend.service; then
                  echo 'Service failed to start'
                  journalctl -u vueseum-frontend.service --no-pager -n 50
                  exit 1
                fi
                
                echo 'Deployment completed successfully'"

            # Cleanup: Delete temporary container
            az storage container delete \
              --account-name vueseumdeploy \
              --name $CONTAINER_NAME \
              --auth-mode login
