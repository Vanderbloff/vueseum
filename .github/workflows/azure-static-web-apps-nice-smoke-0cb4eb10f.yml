name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       id-token: write
       contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
          
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        
      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client
      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
           script: |
               const coredemo = require('@actions/core')
               return await coredemo.getIDToken()
           result-encoding: string

      - name: Install dependencies
        working-directory: ./vueseum-frontend
        run: npm ci
      
      - name: Debug Pre-build
        working-directory: ./vueseum-frontend
        run: |
          pwd
          ls -la
          cat svelte.config.js
          cat vite.config.ts
      
      - name: Build With Debug
        working-directory: ./vueseum-frontend
        run: npm run build --verbose
      
      - name: Debug Post-build
        working-directory: ./vueseum-frontend
        run: |
          ls -la
          ls -la build || echo "build directory not created"
          ls -la .svelte-kit || echo ".svelte-kit directory not created"
          
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_SMOKE_0CB4EB10F }}
          action: "upload"
          app_location: "./vueseum-frontend"
          api_location: ""
          output_location: "build"
          app_build_command: "npm run build"
          skip_app_build: false
          github_id_token: ${{ steps.idtoken.outputs.result }}

      - name: Debug Output
        run: ls -R build

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
